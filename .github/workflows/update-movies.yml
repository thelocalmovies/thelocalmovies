name: Update movie data from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: write

jobs:
  update-movies:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build movie data
        run: node scripts/build-movies.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}

      - name: Commit updated movie data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update movie collection data
          file_pattern: data/movies.json
